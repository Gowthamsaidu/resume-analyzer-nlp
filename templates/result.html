<!DOCTYPE html>
<html>
<head>
<title>Resume Result</title>
</head>

<body>

<h1>Resume Analysis Result</h1>

<h2>Resume Score: {{score}}%</h2>

<h3>Detected Skills</h3>
<ul>
{% for skill in skills %}
<li>{{skill}}</li>
{% endfor %}
</ul>

<h3>Missing Skills</h3>
<ul>
{% for skill in missing %}
<li>{{skill}}</li>
{% endfor %}
</ul>

<br>

<a href="/dashboard">Analyze Another Resume</a>

</body>
</html>
